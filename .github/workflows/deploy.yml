name: Deploy to GitHub Pages

# Push to main builds and publishes the site. workflow_dispatch lets you
# re-run a deploy manually (e.g. after only changing repo Settings) without
# needing an empty commit.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Official Pages flow (configure-pages / upload-pages-artifact / deploy-pages)
# instead of pushing a build to a gh-pages branch: no extra branch to keep in
# sync, and the deploy runs as a first-class GitHub Pages deployment with its
# own environment/URL in the Actions UI.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; a second push while one is running cancels
# the in-progress one rather than racing it.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
